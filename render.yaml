# Infrastructure-as-code for the two Render services backing this monorepo.
# Apply by connecting this repo to Render (Blueprints) and pointing at this file.
# Env vars must be filled in via the Render dashboard (or render.yaml's `envVars`)
# — they are NOT committed here.

services:
  # Node + Express API
  - type: web
    name: agroreach-api
    runtime: node
    rootDir: Backend
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URLS
        sync: false

  # Python Flask ML API (price + crop predictions)
  - type: web
    name: agroreach-ml
    runtime: python
    rootDir: Backend
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install -r requirements_ai.txt
    startCommand: gunicorn backend_api:app -b 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
